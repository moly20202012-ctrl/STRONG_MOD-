<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRONG_MOD STORE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f1a;
color:white;
}

header{
background:#111827;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#00bfff;
}

.search{
text-align:center;
margin:10px;
}

input{
width:85%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

.tabs{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin:10px;
}

.tab{
padding:7px 10px;
background:#1f2937;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

.tab.active{
background:#00bfff;
color:black;
font-weight:bold;
}

.apps{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.card{
background:#1f2937;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.badge{
background:#2563eb;
padding:3px 8px;
font-size:11px;
border-radius:8px;
display:inline-block;
margin-top:5px;
}

#detailPage{
display:none;
padding:15px;
}

#detailPage img{
width:100%;
border-radius:15px;
height:200px;
object-fit:cover;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00bfff;
color:black;
font-weight:bold;
cursor:pointer;
}
.back{
background:#1f2937;
color:white;
}
</style>
</head>

<body>

<header>STRONG_MOD STORE</header>

<!-- HOME -->
<div id="homePage">

<div class="tabs">
<div class="tab active" onclick="setCat('all')">All</div>
<div class="tab" onclick="setCat('apps')">Apps</div>
<div class="tab" onclick="setCat('games')">Games</div>
<div class="tab" onclick="setCat('tools')">Tools</div>
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Search apps..." onkeyup="renderApps()">
</div>

<div id="apps" class="apps"></div>
</div>

<!-- DETAIL -->
<div id="detailPage">
<h2 id="name"></h2>
<img id="img">
<p id="cat"></p>
<p id="desc"></p>

<button id="downloadBtn">Download</button>
<button class="back" onclick="back()">Back</button>
</div>

<script>

let currentCat="all";

const apps=[
{name:"WhatsApp",cat:"apps",img:"https://i.imgur.com/7k12ZQm.png",desc:"Messaging app",link:"https://play.google.com"},
{name:"Instagram",cat:"apps",img:"https://i.imgur.com/8Km9tLL.png",desc:"Social media",link:"https://play.google.com"},
{name:"TikTok",cat:"apps",img:"https://i.imgur.com/3JmNQ0r.png",desc:"Short videos",link:"https://play.google.com"},
{name:"Spotify",cat:"apps",img:"https://i.imgur.com/2lZ4KfF.png",desc:"Music streaming",link:"https://play.google.com"},

{name:"Free Fire",cat:"games",img:"https://i.imgur.com/1XQ9ZQm.png",desc:"Battle royale game",link:"https://play.google.com"},
{name:"PUBG Mobile",cat:"games",img:"https://i.imgur.com/9vQ2x7m.png",desc:"Shooter game",link:"https://play.google.com"},

{name:"VPN Master",cat:"tools",img:"https://i.imgur.com/6kT9pZQ.png",desc:"Secure VPN",link:"https://play.google.com"},
{name:"File Manager",cat:"tools",img:"https://i.imgur.com/8pQ1mZx.png",desc:"Manage files",link:"https://play.google.com"},
{name:"Cleaner",cat:"tools",img:"https://i.imgur.com/5yZ1QkL.png",desc:"Clean phone",link:"https://play.google.com"}
];

const container=document.getElementById("apps");

function renderApps(){
let val=document.getElementById("searchInput").value.toLowerCase();

let list=apps.filter(a=>{
return (currentCat==="all" || a.cat===currentCat)
&& a.name.toLowerCase().includes(val);
});

container.innerHTML="";

list.forEach(app=>{
let div=document.createElement("div");
div.className="card";

div.onclick=()=>{
openApp(app);
};

div.innerHTML=`
<img src="${app.img}">
<div class="card-content">
<h3>${app.name}</h3>
<p>${app.cat}</p>
<span class="badge">APP</span>
</div>
`;

container.appendChild(div);
});
}

function setCat(cat){
currentCat=cat;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");
renderApps();
