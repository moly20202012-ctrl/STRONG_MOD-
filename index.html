<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRONG_MOD</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f1a;
color:white;
}

header{
background:#111827;
padding:18px;
text-align:center;
font-size:24px;
color:#00bfff;
font-weight:bold;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
flex-wrap:wrap;
}

.tab{
padding:7px 10px;
background:#1f2937;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

.tab.active{
background:#00bfff;
color:black;
font-weight:bold;
}

.search{
text-align:center;
margin:10px;
}

input{
width:85%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

.apps{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.card{
background:#1f2937;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.badge{
background:#2563eb;
padding:3px 8px;
font-size:11px;
border-radius:8px;
display:inline-block;
margin-top:5px;
}

#detailPage{
display:none;
padding:15px;
}

button{
background:#00bfff;
border:none;
padding:12px;
width:100%;
border-radius:10px;
color:black;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>STRONG_MOD</header>

<div id="homePage">

<div class="tabs">
<div class="tab active" onclick="setCat('all')">All</div>
<div class="tab" onclick="setCat('apps')">Apps</div>
<div class="tab" onclick="setCat('games')">Games</div>
<div class="tab" onclick="setCat('tools')">Tools</div>
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Search..." onkeyup="filterApps()">
</div>

<div id="apps" class="apps"></div>

</div>

<!-- DETAIL PAGE -->
<div id="detailPage">
<h2 id="appName"></h2>
<img id="appImg" style="width:100%;border-radius:10px">
<p id="appCat"></p>
<p id="appDesc"></p>

<button id="downloadBtn">Download</button>
<button onclick="back()">Back</button>
</div>

<script>

let currentCat = "all";

const apps = [
{
name:"WhatsApp",
category:"apps",
img:"https://i.imgur.com/7k12ZQm.png",
desc:"Messaging app",
download:"https://play.google.com"
},
{
name:"Instagram",
category:"apps",
img:"https://i.imgur.com/8Km9tLL.png",
desc:"Social media app",
download:"https://play.google.com"
},
{
name:"TikTok",
category:"apps",
img:"https://i.imgur.com/3JmNQ0r.png",
desc:"Short videos platform",
download:"https://play.google.com"
},
{
name:"Spotify",
category:"apps",
img:"https://i.imgur.com/2lZ4KfF.png",
desc:"Music streaming",
download:"https://play.google.com"
},

{
name:"Free Fire",
category:"games",
img:"https://i.imgur.com/1XQ9ZQm.png",
desc:"Battle royale game",
download:"https://play.google.com"
},
{
name:"PUBG Mobile",
category:"games",
img:"https://i.imgur.com/9vQ2x7m.png",
desc:"Shooter game",
download:"https://play.google.com"
},
{
name:"Subway Surfers",
category:"games",
img:"https://i.imgur.com/4yQ8aZp.png",
desc:"Endless runner",
download:"https://play.google.com"
},

{
name:"VPN Master",
category:"tools",
img:"https://i.imgur.com/6kT9pZQ.png",
desc:"Secure VPN tool",
download:"https://play.google.com"
},
{
name:"File Manager",
category:"tools",
img:"https://i.imgur.com/8pQ1mZx.png",
desc:"Manage files easily",
download:"https://play.google.com"
},
{
name:"Cleaner App",
category:"tools",
img:"https://i.imgur.com/5yZ1QkL.png",
desc:"Clean storage and boost phone",
download:"https://play.google.com"
}
];

const container = document.getElementById("apps");

function render(list){
container.innerHTML="";

list.forEach(app=>{
const card=document.createElement("div");
card.className="card";
card.onclick=()=>openApp(app);

card.innerHTML=`
<img src="${app.img}">
<div class="card-content">
<h3>${app.name}</h3>
<p>${app.category}</p>
<span class="badge">APP</span>
</div>
`;

container.appendChild(card);
});
}

function filterApps(){
let list = apps;

if(currentCat !== "all"){
list = list.filter(a => a.category === currentCat);
}

const val = document.getElementById("searchInput").value.toLowerCase();

list = list.filter(a =>
a.name.toLowerCase().includes(val)
);

render(list);
}

function setCat(cat){
currentCat = cat;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

filterApps();
}

function openApp(app){
document.getElementById("homePage").style.display="none";
document.getElementById("detailPage").style.display="block";

document.getElementById("appName").innerText=app.name;
document.getElementById("appImg").src=app.img;
document.getElementById("appCat").innerText=app.category;
document.getElementById("appDesc").innerText=app.desc;

document.getElementById("downloadBtn").onclick=()=>{
window.open(app.download,"_blank");
};
}

function back(){
document.getElementById("homePage").style.display="block";
document.getElementById("detailPage").style.display="none";
}

render(apps);

</script>

</body>
</html>
