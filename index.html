<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRONG_MOD</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f1a;
color:white;
}

header{
background:#111827;
padding:18px;
text-align:center;
font-size:24px;
color:#00bfff;
font-weight:bold;
}

.search{
text-align:center;
margin:10px;
}

input{
width:85%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

.apps{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.card{
background:#1f2937;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.badge{
background:#2563eb;
padding:3px 8px;
font-size:11px;
border-radius:8px;
display:inline-block;
margin-top:5px;
}

.tabs{
display:flex;
justify-content:center;
gap:8px;
margin:10px;
flex-wrap:wrap;
}

.tab{
padding:7px 10px;
background:#1f2937;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

.tab.active{
background:#00bfff;
color:black;
font-weight:bold;
}
</style>
</head>

<body>

<header>STRONG_MOD</header>

<div class="tabs">
<div class="tab active" onclick="setCat('all')">All</div>
<div class="tab" onclick="setCat('apps')">Apps</div>
<div class="tab" onclick="setCat('games')">Games</div>
<div class="tab" onclick="setCat('tools')">Tools</div>
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Search apps..." onkeyup="filterApps()">
</div>

<div id="apps" class="apps"></div>

<script>
const apps = [
{name:"WhatsApp",category:"apps",img:"https://i.imgur.com/7k12ZQm.png",desc:"Messaging app"},
{name:"Instagram",category:"apps",img:"https://i.imgur.com/8Km9tLL.png",desc:"Social media"},
{name:"TikTok",category:"apps",img:"https://i.imgur.com/3JmNQ0r.png",desc:"Short videos"},
{name:"Spotify",category:"apps",img:"https://i.imgur.com/2lZ4KfF.png",desc:"Music streaming"},

{name:"Free Fire",category:"games",img:"https://i.imgur.com/1XQ9ZQm.png",desc:"Battle royale"},
{name:"PUBG Mobile",category:"games",img:"https://i.imgur.com/9vQ2x7m.png",desc:"Shooter game"},

{name:"VPN Master",category:"tools",img:"https://i.imgur.com/6kT9pZQ.png",desc:"Secure VPN"},
{name:"File Manager",category:"tools",img:"https://i.imgur.com/8pQ1mZx.png",desc:"Manage files"}
];

let currentCat="all";

const container=document.getElementById("apps");

function render(list){
container.innerHTML="";

list.forEach(app=>{
const card=document.createElement("div");
card.className="card";

card.onclick=()=>{
window.location.href = "app.html?name=" + encodeURIComponent(app.name);
};

card.innerHTML=`
<img src="${app.img}">
<div class="card-content">
<h3>${app.name}</h3>
<p>${app.category}</p>
<span class="badge">APP</span>
</div>
`;

container.appendChild(card);
});
}

function filterApps(){
let list=apps;

if(currentCat!=="all"){
list=list.filter(a=>a.category===currentCat);
}

const val=document.getElementById("searchInput").value.toLowerCase();

list=list.filter(a=>a.name.toLowerCase().includes(val));

render(list);
}

function setCat(cat){
currentCat=cat;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");
filterApps();
}

render(apps);
</script>

</body>
</html>
