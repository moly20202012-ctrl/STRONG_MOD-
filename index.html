<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STRONG_MOD</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f1a;
      color: white;
    }

    header {
      background: #111827;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #00bfff;
    }

    .search {
      text-align: center;
      margin: 20px;
    }

    input {
      width: 80%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    .apps {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .card:hover {
      background: #374151;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: gray;
    }
  </style>

</head>

<body>

<header>
  STRONG_MOD
</header>

<div class="search">
  <input type="text" placeholder="Search apps...">
</div>

<div class="apps">

  <div class="card">WhatsApp</div>
  <div class="card">Instagram</div>
  <div class="card">TikTok</div>
  <div class="card">Spotify</div>

</div>

<footer>
  © 2026 STRONG_MOD
</footer>

</body>
</html>
