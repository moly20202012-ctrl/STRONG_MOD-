<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Details</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f1a;
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
color:#00bfff;
font-weight:bold;
}

.container{
padding:15px;
}

img{
width:100%;
height:200px;
object-fit:cover;
border-radius:15px;
}

h2{
color:#00bfff;
}

.badge{
background:#2563eb;
padding:5px 10px;
border-radius:8px;
font-size:12px;
display:inline-block;
}

p{
color:#d1d5db;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00bfff;
color:black;
font-weight:bold;
cursor:pointer;
}

.back{
background:#1f2937;
color:white;
}
</style>
</head>

<body>

<header>STRONG_MOD</header>

<div class="container" id="content">Loading...</div>

<script>

const apps = [
{name:"WhatsApp",category:"apps",img:"https://i.imgur.com/7k12ZQm.png",desc:"Messaging app",download:"https://play.google.com"},
{name:"Instagram",category:"apps",img:"https://i.imgur.com/8Km9tLL.png",desc:"Social media",download:"https://play.google.com"},
{name:"TikTok",category:"apps",img:"https://i.imgur.com/3JmNQ0r.png",desc:"Short videos platform",download:"https://play.google.com"},
{name:"Spotify",category:"apps",img:"https://i.imgur.com/2lZ4KfF.png",desc:"Music streaming service",download:"https://play.google.com"},

{name:"Free Fire",category:"games",img:"https://i.imgur.com/1XQ9ZQm.png",desc:"Battle royale game",download:"https://play.google.com"},
{name:"PUBG Mobile",category:"games",img:"https://i.imgur.com/9vQ2x7m.png",desc:"Shooter game",download:"https://play.google.com"}
];

function getName(){
const url=new URLSearchParams(window.location.search);
return url.get("name");
}

function load(){
const name=getName();
const app=apps.find(a=>a.name===name);

const c=document.getElementById("content");

if(!app){
c.innerHTML="<h2>App not found</h2>";
return;
}

c.innerHTML=`
<img src="${app.img}">
<h2>${app.name}</h2>
<span class="badge">${app.category}</span>
<p>${app.desc}</p>

<button onclick="window.open('${app.download}','_blank')">Download</button>
<button class="back" onclick="history.back()">Back</button>
`;
}

load();

</script>

</body>
</html>
