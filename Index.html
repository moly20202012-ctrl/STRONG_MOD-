<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRONG_MOD</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f1a;color:white;}
header{background:#111827;padding:18px;text-align:center;color:#00bfff;font-size:24px;font-weight:bold;}
.apps{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:15px;}
.card{background:#1f2937;border-radius:15px;padding:10px;cursor:pointer;}
.card img{width:100%;border-radius:10px;height:120px;object-fit:cover;}
</style>
</head>

<body>

<header>STRONG_MOD WORKING</header>

<div id="apps" class="apps"></div>

<script>
const apps=[
{name:"WhatsApp",img:"https://i.imgur.com/7k12ZQm.png",cat:"apps"},
{name:"Instagram",img:"https://i.imgur.com/8Km9tLL.png",cat:"apps"},
{name:"TikTok",img:"https://i.imgur.com/3JmNQ0r.png",cat:"apps"},
{name:"Spotify",img:"https://i.imgur.com/2lZ4KfF.png",cat:"apps"}
];

const container=document.getElementById("apps");

function render(){
container.innerHTML="";
apps.forEach(a=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${a.img}">
<h3>${a.name}</h3>
<p>${a.cat}</p>
`;
container.appendChild(div);
});
}

render();
</script>

</body>
</html>
